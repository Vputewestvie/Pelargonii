<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторская коллекция пеларгоний</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { botanical: { deep: '#1C352D', sage: '#5B7065', cream: '#FAF9F5', gold: '#B48B5C' } },
                    fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FAF9F5; color: #1C352D; font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .zoom-transition { transition: all 0.3s ease; }
        /* Простой спиннер */
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #B48B5C; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body x-data="catalogApp()" x-init="init()" class="relative" @keydown.escape="closeModal(); comparisonOpen = false; isFullScreen = false">

    <!-- ШАПКА (без изменений) -->
    <header class="border-b border-botanical-sage/20 py-8 px-4 bg-white/50 backdrop-blur-md sticky top-0 z-30">
        <div class="max-w-[1600px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <span class="text-xs uppercase tracking-[0.2em] text-botanical-gold font-semibold">Авторская Коллекция</span>
                <h1 class="font-serif text-3xl md:text-4xl text-botanical-deep font-semibold mt-1">Цветочная Галерея</h1>
            </div>
            <div class="text-center md:text-right text-xs text-botanical-sage max-w-xs">
                Выберите понравившиеся сорта и просто напишите мне их названия в диалоге на Авито.
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-4 py-8">
        <!-- СОСТОЯНИЕ ЗАГРУЗКИ / ОШИБКИ -->
        <div x-show="loading" class="text-center py-20">
            <div class="spinner"></div>
            <p class="mt-4 text-botanical-sage">Загрузка каталога...</p>
        </div>
        <div x-show="error" class="text-center py-20 text-red-600">
            <p class="text-lg font-semibold">⚠️ Не удалось загрузить каталог</p>
            <p class="text-sm mt-2">Попробуйте обновить страницу или зайдите позже.</p>
        </div>

        <!-- ФИЛЬТРЫ (показываем, только если данные загружены) -->
        <div x-show="!loading && !error" class="bg-white rounded-3xl p-6 shadow-sm border border-botanical-sage/10 mb-8">
            <div class="flex flex-col lg:flex-row gap-6 justify-between items-center">
                <div class="flex flex-wrap gap-2">
                    <template x-for="group in groups" :key="group">
                        <button @click="activeGroup = group"
                                :class="activeGroup === group ? 'bg-botanical-deep text-white' : 'bg-botanical-cream text-botanical-deep hover:bg-botanical-sage/10'"
                                class="px-5 py-2.5 rounded-full text-sm font-medium transition duration-300"
                                x-text="group === 'all' ? 'Все сорта' : capitalize(group)"></button>
                    </template>
                </div>
                <div class="flex flex-col sm:flex-row gap-4 items-center w-full lg:w-auto">
                    <!-- Поиск с debounce (используем x-model.debounce) -->
                    <input type="text" x-model.debounce="searchQuery" placeholder="Поиск сорта..." class="w-full sm:w-64 bg-botanical-cream rounded-full px-5 py-2.5 text-sm border border-botanical-sage/20 focus:outline-none focus:border-botanical-gold">
                    <label class="flex items-center gap-2 cursor-pointer whitespace-nowrap">
                        <input type="checkbox" x-model="onlyInStock" class="rounded text-botanical-deep focus:ring-botanical-gold w-5 h-5">
                        <span class="text-sm font-medium text-botanical-deep">Только в наличии</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- КАРТОЧКИ -->
        <div x-show="!loading && !error" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 pb-24">
            <template x-for="plant in filteredPlants()" :key="plant.id">
                <div class="bg-white rounded-3xl border border-botanical-sage/10 shadow-sm overflow-hidden flex flex-col hover:shadow-xl transition duration-300">
                    <!-- ... карточка без изменений ... -->
                    <div class="relative aspect-[4/3] bg-botanical-cream overflow-hidden cursor-pointer" @click="openModal(plant)">
                        <img :src="plant.media[0]" loading="lazy" class="w-full h-full object-contain hover:scale-105 transition duration-500">
                        <div class="absolute top-3 left-3 bg-white/95 backdrop-blur-sm px-3 py-1 rounded-full text-[10px] uppercase font-semibold text-botanical-gold shadow-sm" x-text="plant.group"></div>
                        <div class="absolute top-3 right-3 shadow-sm">
                            <span :class="plant.stock > 0 ? 'bg-emerald-500/90 text-white' : 'bg-rose-500/90 text-white'" class="px-3 py-1 rounded-full text-[10px] uppercase font-bold" x-text="plant.stock > 0 ? 'В наличии' : 'Ожидается'"></span>
                        </div>
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <h3 class="font-serif text-xl font-bold leading-tight text-botanical-deep cursor-pointer" @click="openModal(plant)">
                            <span x-text="plant.number ? '№' + plant.number + ' ' : ''"></span><span x-text="plant.title"></span>
                        </h3>
                        <div class="flex gap-4 my-4 text-xs text-botanical-sage border-y border-botanical-sage/5 py-3">
                            <span x-show="plant.flowerSize">🌸 <span class="font-semibold text-botanical-deep" x-text="plant.flowerSize"></span></span>
                            <span x-show="plant.inflorescenceSize">💮 <span class="font-semibold text-botanical-deep" x-text="plant.inflorescenceSize"></span></span>
                        </div>
                        <div class="mt-auto pt-2 flex justify-between items-center gap-2">
                            <span class="text-2xl font-bold text-botanical-deep" x-text="plant.price + ' ₽'"></span>
                            <div class="flex gap-2">
                                <button @click="toggleComparison(plant)" :class="isInComparison(plant) ? 'bg-botanical-gold text-white' : 'bg-botanical-cream text-botanical-deep hover:bg-botanical-sage/10'" class="p-2.5 rounded-xl text-sm transition" title="Сравнить" aria-label="Сравнить сорт">⚖️</button>
                                <button @click="toggleSelection(plant)" :class="isSelected(plant) ? 'bg-botanical-deep text-white' : 'border-2 border-botanical-deep text-botanical-deep hover:bg-botanical-cream'" class="px-4 py-2 rounded-xl text-sm font-semibold transition" x-text="isSelected(plant) ? 'В корзине' : 'Выбрать'"></button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            <div x-show="filteredPlants().length === 0" class="col-span-full text-center py-16 text-botanical-sage">
                <p class="text-xl">Ничего не найдено 😔</p>
                <p class="text-sm">Попробуйте изменить фильтры или поиск.</p>
            </div>
        </div>
    </main>

    <!-- МОДАЛКА (без изменений) -->
    <!-- ... (оставляем прежний код модалки, он уже содержит @keydown.escape глобально) -->

    <!-- ПОЛНОЭКРАННЫЙ ПРОСМОТР -->
    <!-- ... (без изменений) -->

    <!-- БАР СРАВНЕНИЯ -->
    <!-- ... (без изменений) -->

    <!-- КОРЗИНА АВИТО -->
    <!-- ... (без изменений) -->

    <!-- СКРИПТ -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('catalogApp', () => ({
                // Данные
                plants: [],
                groups: ['all'],
                activeGroup: 'all',
                searchQuery: '',
                onlyInStock: false,

                // Состояния
                loading: true,
                error: false,

                // Выбранное и сравнение (восстанавливаем из localStorage)
                selectionList: [],
                comparisonList: [],

                // Модалка
                modalOpen: false,
                currentPlant: { media: [], title: '', group: '' },
                activePhotoIndex: 0,
                comparisonOpen: false,
                isFullScreen: false,

                // ---- ИНИЦИАЛИЗАЦИЯ ----
                async init() {
                    // Восстанавливаем сохранённые списки
                    this.restoreFromStorage();

                    try {
                        const id = '1tr_vl_q8yh4grAmJkaD7QvmueQQvbJGojm7C_otpyd4';
                        const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
                        const text = await res.text();

                        const startIdx = text.indexOf('{');
                        const endIdx = text.lastIndexOf('}');
                        if (startIdx === -1) throw new Error('Неверный формат ответа');

                        const json = JSON.parse(text.substring(startIdx, endIdx + 1));

                        const parsePhotos = (str) => {
                            if (!str) return [];
                            return str.split(/[|, \n]+/).map(s => s.trim()).filter(s => s.startsWith('http'));
                        };

                        this.plants = json.table.rows.map((row, i) => {
                            const c = (idx) => {
                                if (!row || !row.c || !row.c[idx] || row.c[idx].v === null || row.c[idx].v === undefined) return '';
                                return String(row.c[idx].v).trim();
                            };
                            const title = c(1);
                            if (!title) return null;
                            const mediaList = [];
                            mediaList.push(...parsePhotos(c(12)));
                            mediaList.push(...parsePhotos(c(13)));
                            if (mediaList.length === 0) mediaList.push('https://via.placeholder.com/600?text=Нет+фото');
                            return {
                                id: i, number: c(0), title: title, stock: Number(c(2)) || 0,
                                latinTitle: c(3), group: String(c(4) || 'all').toLowerCase(),
                                flowerSize: c(6), inflorescenceSize: c(7), price: Number(c(8)) || 0,
                                description: c(9), color: c(5), media: mediaList
                            };
                        }).filter(p => p !== null);

                        this.groups = ['all', ...new Set(this.plants.map(p => p.group))];
                        this.loading = false;
                    } catch (e) {
                        console.error('Ошибка загрузки:', e);
                        this.error = true;
                        this.loading = false;
                    }

                    // После загрузки синхронизируем выбранные элементы (вдруг какой-то сорт уже не существует)
                    this.selectionList = this.selectionList.filter(p => this.plants.some(pl => pl.id === p.id));
                    this.comparisonList = this.comparisonList.filter(p => this.plants.some(pl => pl.id === p.id));
                    this.saveToStorage();
                },

                // ---- РАБОТА С ХРАНИЛИЩЕМ ----
                restoreFromStorage() {
                    try {
                        const sel = JSON.parse(localStorage.getItem('pelargonium_selection'));
                        const comp = JSON.parse(localStorage.getItem('pelargonium_comparison'));
                        if (Array.isArray(sel)) this.selectionList = sel;
                        if (Array.isArray(comp)) this.comparisonList = comp;
                    } catch (e) { /* игнорируем */ }
                },
                saveToStorage() {
                    localStorage.setItem('pelargonium_selection', JSON.stringify(this.selectionList));
                    localStorage.setItem('pelargonium_comparison', JSON.stringify(this.comparisonList));
                },

                // ---- ФИЛЬТРАЦИЯ ----
                filteredPlants() {
                    return this.plants.filter(p => {
                        const mGroup = this.activeGroup === 'all' || p.group === this.activeGroup;
                        const mStock = !this.onlyInStock || p.stock > 0;
                        const mSearch = String(p.title).toLowerCase().includes(this.searchQuery.toLowerCase());
                        return mGroup && mStock && mSearch;
                    });
                },

                // ---- ВЫБОР И СРАВНЕНИЕ (с автосохранением) ----
                toggleSelection(p) {
                    const idx = this.selectionList.findIndex(item => item.id === p.id);
                    if (idx > -1) this.selectionList.splice(idx, 1);
                    else this.selectionList.push(p);
                    this.saveToStorage();
                },
                isSelected(p) { return this.selectionList.some(item => item.id === p.id); },
                calculateTotal() { return this.selectionList.reduce((sum, p) => sum + p.price, 0); },

                toggleComparison(p) {
                    const idx = this.comparisonList.findIndex(item => item.id === p.id);
                    if (idx > -1) {
                        this.comparisonList.splice(idx, 1);
                    } else {
                        if (this.comparisonList.length >= 3) {
                            alert('Не более 3 сортов для сравнения');
                            return;
                        }
                        this.comparisonList.push(p);
                    }
                    this.saveToStorage();
                },
                isInComparison(p) { return this.comparisonList.some(item => item.id === p.id); },

                // ---- МОДАЛКА ----
                openModal(plant) {
                    this.currentPlant = plant;
                    this.activePhotoIndex = 0;
                    this.modalOpen = true;
                    this.isFullScreen = false;
                },
                closeModal() {
                    this.modalOpen = false;
                },

                // ---- ФОТО (полный экран) ----
                openFullScreen() { this.isFullScreen = true; },
                nextPhoto() {
                    if (this.activePhotoIndex < this.currentPlant.media.length - 1) this.activePhotoIndex++;
                    else this.activePhotoIndex = 0;
                },
                prevPhoto() {
                    if (this.activePhotoIndex > 0) this.activePhotoIndex--;
                    else this.activePhotoIndex = this.currentPlant.media.length - 1;
                },

                // ---- ВСПОМОГАТЕЛЬНЫЕ ----
                capitalize(str) { return str ? String(str).charAt(0).toUpperCase() + String(str).slice(1) : ''; },
                parseBullets(desc) {
                    if (!desc) return [];
                    const items = desc.split('•').map(b => b.trim()).filter(b => b);
                    return items.length ? items : [desc]; // если нет маркеров, показываем как один абзац
                },
                getCare(group) {
                    const g = String(group || '').toLowerCase();
                    if (g.includes('розебуд')) return { light: "Яркий свет. Избегать прямых лучей.", water: "Умеренный, после просыхания." };
                    if (g.includes('тюльпан')) return { light: "Рассеянный свет, боятся ожогов.", water: "Очень умеренный, без застоя." };
                    return { light: "Яркий рассеянный свет.", water: "По мере просыхания земли." };
                },
                copyForAvito() {
                    let text = "Здравствуйте! Хочу приобрести:\n\n";
                    this.selectionList.forEach(p => text += `• ${p.title} (${p.price} ₽)\n`);
                    text += `\nИтого: ${this.calculateTotal()} ₽.`;
                    navigator.clipboard.writeText(text).then(() => alert('Список скопирован в буфер!'));
                }
            }));
        });
    </script>
</body>
</html>
